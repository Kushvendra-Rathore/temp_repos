<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Achievements & Certifications</title>

<!-- Import Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800;900&family=Playfair+Display:ital,wght@0,600;0,700;0,800;1,600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">

<style>
    :root {
        --bg-main: transparent; 
        --primary-brown: #a07d63; 
        --text-dark: #1a1513;
        --text-muted: #5a524e;
        --card-bg: #ffffff;
        --border-color: #e2ddd7;
        --shape-bg: #ede7df;
        --accent-red: #f0a3a3;

        font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body, html {
        width: 100%;
        background-color: #f5f5f5 !important;
        color: var(--text-dark);
        line-height: 1.6;
        overflow-x: hidden;
    }

    .container {
        max-width: 1050px;
        margin: 0 auto;
        padding: 4rem 2%;
        display: flex;
        flex-direction: column;
        gap: 3rem;
    }

    /* --- ANIMATIONS --- */
    .fade-up {
        opacity: 0;
        transform: translateY(40px);
        transition: opacity 0.8s cubic-bezier(0.25, 0.8, 0.25, 1), transform 0.8s cubic-bezier(0.25, 0.8, 0.25, 1);
    }
    .fade-up.visible {
        opacity: 1;
        transform: translateY(0);
    }

    /* --- PAGE HEADER --- */
    .page-header {
        text-align: center;
        margin-bottom: 1rem;
        border-bottom: 2px solid var(--text-dark);
        padding-bottom: 1.5rem;
    }

    .unit-label {
        font-family: 'Inter', sans-serif;
        font-weight: 800;
        color: var(--primary-brown);
        text-transform: uppercase;
        letter-spacing: 0.1em;
        margin-bottom: 0.5rem;
    }

    .main-title {
        font-family: 'Playfair Display', serif;
        font-weight: 800;
        font-size: 3.2rem;
        color: var(--text-dark);
        line-height: 1.1;
    }

    /* --- CERTIFICATE CONTAINER --- */
    .certificate-container {
        width: 100%;
        background: var(--card-bg);
        border: 1px solid var(--border-color);
        border-radius: 12px;
        padding: 2rem;
        box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .certificate-content {
        width: 100%;
        max-width: 900px;
        height: 700px; /* Great height for PDFs */
        border: 2px solid var(--border-color);
        border-radius: 8px;
        overflow: hidden;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    @media (max-width: 800px) {
        .main-title { font-size: 2.5rem; }
        .certificate-container { padding: 1rem; }
        .certificate-content { height: 500px; }
    }
</style>
</head>
<body>

<div class="container">

    <!-- PAGE HEADER -->
    <div class="page-header fade-up">
        <div class="unit-label">PORTFOLIO</div>
        <h1 class="main-title">Achievements & Certifications</h1>
    </div>

    <!-- DIRECT CERTIFICATE DISPLAY -->
    <div class="fade-up certificate-container">
        <!-- 
          Hey! You forgot to paste the file name in your message! 
          Just replace 'YOUR_FILENAME_HERE.pdf' below with the actual file name.
          If your certificate is an image (.jpg or .png), delete the iframe line and uncomment the img line below it.
        -->
        <iframe class="certificate-content" src="Certificate of code.png" frameborder="0" allowfullscreen></iframe>
        
        <!-- <img class="certificate-content" src="YOUR_FILENAME_HERE.png" style="height: auto;"> -->
    </div>

</div>

<!-- SCROLL ANIMATION SCRIPT -->
<script>
    document.addEventListener("DOMContentLoaded", function() {
        const elements = document.querySelectorAll(".fade-up");
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add("visible");
                }
            });
        }, { threshold: 0.1, rootMargin: "0px 0px -50px 0px" });

        elements.forEach(el => observer.observe(el));
    });
</script>

</body>
</html>
