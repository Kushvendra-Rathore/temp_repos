<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>React Portfolio Home</title>
<!-- React & ReactDOM -->
<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
<!-- Babel for in-browser JSX compilation -->
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
    :root {
        --bg-main: #faf8f5;
        --primary-brown: #a07d63;
        --secondary-brown: #d9cec6;
        --text-dark: #3a2e28;
        --text-light: #ffffff;
    }

    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
        background-color: var(--bg-main);
        color: var(--text-dark);
        line-height: 1.7;
        overflow-x: hidden;
    }

    /* SCROLL ANIMATION */
    .reveal {
        opacity: 0;
        transform: translateY(40px);
        transition: all 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
    }
    .reveal.active {
        opacity: 1;
        transform: translateY(0);
    }

    /* HERO SECTION */
    .hero {
        position: relative;
        padding: 8rem 10% 6rem;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
    }

    .hero-bg-shape {
        position: absolute;
        top: -10%;
        right: -5%;
        width: 300px;
        height: 400px;
        background-color: var(--secondary-brown);
        border-radius: 200px 0 0 200px;
        z-index: -1;
        opacity: 0.6;
    }

    .hero-tag {
        font-size: 0.85rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 3px;
        color: var(--primary-brown);
        margin-bottom: 1.5rem;
    }

    .hero h1 {
        font-size: 4rem;
        font-family: 'Georgia', serif;
        color: var(--text-dark);
        line-height: 1.1;
        margin-bottom: 1.5rem;
    }

    .hero p {
        font-size: 1.1rem;
        max-width: 600px;
        color: #665952;
    }

    /* SECTIONS */
    .section {
        padding: 5rem 10%;
    }

    .section-title {
        font-size: 2.5rem;
        font-family: 'Georgia', serif;
        color: var(--text-dark);
        margin-bottom: 3rem;
        display: flex;
        align-items: center;
        gap: 15px;
    }

    .section-title::after {
        content: "";
        height: 2px;
        flex-grow: 1;
        background-color: var(--secondary-brown);
    }

    /* ABOUT SECTION */
    .about-container {
        display: flex;
        gap: 4rem;
        align-items: flex-start;
    }

    .about-text {
        flex: 1;
        font-size: 1.05rem;
        color: #554a43;
    }

    .about-stats {
        flex: 0.4;
        background: #fff;
        padding: 2rem;
        border-radius: 0 40px 0 40px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.04);
        border: 1px solid var(--secondary-brown);
    }

    .stat-block {
        margin-bottom: 1.5rem;
    }
    
    .stat-block h4 {
        color: var(--primary-brown);
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 0.5rem;
    }

    /* INTERACTIVE SKILLS SECTION */
    .skills-wrapper {
        background-color: #fff;
        padding: 3rem;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.03);
    }

    .tabs-header {
        display: flex;
        gap: 1rem;
        margin-bottom: 2rem;
        border-bottom: 2px solid #f0e9e4;
        padding-bottom: 1rem;
    }

    .tab-btn {
        background: none;
        border: none;
        font-size: 1.1rem;
        font-family: 'Georgia', serif;
        color: #999;
        cursor: pointer;
        padding: 0.5rem 1rem;
        transition: all 0.3s ease;
        position: relative;
    }

    .tab-btn:hover {
        color: var(--primary-brown);
    }

    .tab-btn.active {
        color: var(--text-dark);
        font-weight: bold;
    }

    .tab-btn.active::after {
        content: "";
        position: absolute;
        bottom: -17px;
        left: 0;
        width: 100%;
        height: 3px;
        background-color: var(--primary-brown);
        border-radius: 3px 3px 0 0;
    }

    .skill-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        min-height: 80px; /* Prevents layout shift */
        animation: fadeIn 0.4s ease-out;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(5px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .pill {
        background-color: var(--bg-main);
        color: var(--text-dark);
        padding: 8px 20px;
        border-radius: 30px;
        font-size: 0.9rem;
        border: 1px solid var(--secondary-brown);
        transition: all 0.3s ease;
        cursor: default;
    }

    .pill:hover {
        background-color: var(--primary-brown);
        color: #fff;
        border-color: var(--primary-brown);
        transform: translateY(-3px);
    }

    /* PROJECTS SECTION */
    .project-row {
        display: flex;
        gap: 3rem;
        margin-bottom: 5rem;
        align-items: center;
    }

    .project-row:nth-child(even) {
        flex-direction: row-reverse;
    }

    .project-number {
        font-family: 'Georgia', serif;
        font-size: 5rem;
        color: var(--secondary-brown);
        font-weight: bold;
        line-height: 1;
        flex: 0.2;
        text-align: center;
    }

    .project-content {
        flex: 1;
        background: #fff;
        padding: 3rem;
        border-radius: 20px;
        border-left: 4px solid var(--primary-brown);
        box-shadow: 0 10px 30px rgba(0,0,0,0.03);
        transition: transform 0.3s ease;
    }

    .project-row:nth-child(even) .project-content {
        border-left: none;
        border-right: 4px solid var(--primary-brown);
    }

    .project-content:hover {
        transform: translateY(-5px);
    }

    .project-content h3 {
        font-size: 1.8rem;
        font-family: 'Georgia', serif;
        margin-bottom: 1rem;
    }

    .project-content p {
        color: #665952;
        margin-bottom: 1.5rem;
    }

    /* FOOTER */
    .footer {
        background-color: var(--text-dark);
        color: var(--bg-main);
        padding: 5rem 10% 2rem;
        text-align: center;
        margin-top: 2rem;
    }

    .footer h2 {
        font-family: 'Georgia', serif;
        font-size: 2.5rem;
        margin-bottom: 1rem;
    }

    .footer-links {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin: 2.5rem 0;
    }

    .btn {
        display: inline-block;
        border: 2px solid var(--primary-brown);
        color: var(--bg-main);
        padding: 12px 35px;
        border-radius: 30px;
        text-decoration: none;
        font-weight: 600;
        letter-spacing: 1px;
        transition: all 0.3s ease;
    }

    .btn:hover {
        background-color: var(--primary-brown);
        color: #fff;
    }

    .copyright {
        margin-top: 3rem;
        border-top: 1px solid rgba(255,255,255,0.1);
        padding-top: 1.5rem;
        font-size: 0.85rem;
        color: #999;
    }

    @media (max-width: 900px) {
        .about-container, .project-row { flex-direction: column; }
        .project-row:nth-child(even) { flex-direction: column; }
        .hero h1 { font-size: 3rem; }
        .project-number { display: none; }
        .tabs-header { flex-direction: column; gap: 0.5rem; }
        .tab-btn.active::after { display: none; }
        .tab-btn { border-left: 3px solid transparent; text-align: left; }
        .tab-btn.active { border-left: 3px solid var(--primary-brown); }
    }
</style>
</head>
<body>

<div id="root"></div>

<script type="text/babel">
    const { useState, useEffect } = React;

    const PortfolioHome = () => {
        const [activeSkillTab, setActiveSkillTab] = useState('Languages');

        const skillsData = {
            'Languages': ['C++', 'Java', 'Python', 'JavaScript'],
            'Backend & Databases': ['Node.js', 'Express.js', 'MySQL', 'MongoDB', 'System Design'],
            'Frontend': ['React.js', 'HTML5', 'CSS3', 'UI/UX Logic']
        };

        // Re-initialize intersection observer when component mounts
        useEffect(() => {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add("active");
                    }
                });
            }, {
                threshold: 0.15,
                rootMargin: "0px 0px -50px 0px"
            });

            const elements = document.querySelectorAll(".reveal");
            elements.forEach(el => observer.observe(el));

            return () => {
                elements.forEach(el => observer.unobserve(el));
            };
        }, []);

        return (
            <div>
                {/* HERO */}
                <section className="hero reveal active">
                    <div className="hero-bg-shape"></div>
                    <div className="hero-tag">Computer Science & Engineering</div>
                    <h1>Kushvendra<br/>Singh Rathore</h1>
                    <p>I build efficient, secure, and highly scalable software systems. I prioritize clean logic, practical architecture, and writing code that actually solves real-world problems.</p>
                </section>

                {/* ABOUT */}
                <section className="section reveal">
                    <h2 className="section-title">Professional Profile</h2>
                    <div className="about-container">
                        <div className="about-text">
                            <p style={{ marginBottom: '1.5rem' }}>I am a B.E. student at KLE Technological University in Hubballi, intensely focused on backend architecture and full-stack development. I don't believe in bloated software; I believe in optimizing time complexity, securing data, and designing systems that can handle real stress.</p>
                            <p>Beyond standard coursework, I actively engage in competitive programming (Codeforces, LeetCode) and stay updated on high-performance technology hardware. My approach to engineering is straightforward: analyze the problem, define the constraints, and engineer the most logical solution.</p>
                        </div>
                        <div className="about-stats">
                            <div className="stat-block">
                                <h4>Current Focus</h4>
                                <p>MERN Stack & Scalable P2P Systems</p>
                            </div>
                            <div className="stat-block">
                                <h4>University</h4>
                                <p>KLE Tech, Hubballi</p>
                            </div>
                            <div className="stat-block">
                                <h4>Core Interests</h4>
                                <p>Algorithms, Databases, System Architecture</p>
                            </div>
                        </div>
                    </div>
                </section>

                {/* INTERACTIVE SKILLS */}
                <section className="section reveal">
                    <h2 className="section-title">Technical Expertise</h2>
                    <div className="skills-wrapper">
                        <div className="tabs-header">
                            {Object.keys(skillsData).map(tab => (
                                <button 
                                    key={tab}
                                    className={`tab-btn ${activeSkillTab === tab ? 'active' : ''}`}
                                    onClick={() => setActiveSkillTab(tab)}
                                >
                                    {tab}
                                </button>
                            ))}
                        </div>
                        <div className="skill-tags" key={activeSkillTab}>
                            {skillsData[activeSkillTab].map(skill => (
                                <span key={skill} className="pill">{skill}</span>
                            ))}
                        </div>
                    </div>
                </section>

                {/* PROJECTS */}
                <section className="section reveal">
                    <h2 className="section-title">Featured Work</h2>
                    
                    {/* Project 1 */}
                    <div className="project-row">
                        <div className="project-number">01</div>
                        <div className="project-content">
                            <h3>KLX – KLE Online Exchange</h3>
                            <p>Engineered a secure, campus-specific digital marketplace for students to buy and sell products. Designed to solve the issue of low trust in peer-to-peer transactions by strictly requiring college authentication. I implemented a robust First-In-First-Out (FIFO) queue system to fairly manage high demand for popular items, ensuring system stability even under heavy concurrent user load.</p>
                            <div style={{ display: 'flex', gap: '10px', marginTop: '1rem' }}>
                                <span className="pill" style={{ border: 'none', background: '#f0e9e4' }}>MERN Stack</span>
                                <span className="pill" style={{ border: 'none', background: '#f0e9e4' }}>Authentication</span>
                            </div>
                        </div>
                    </div>

                    {/* Project 2 */}
                    <div className="project-row reveal">
                        <div className="project-number">02</div>
                        <div className="project-content">
                            <h3>Student Record Management System</h3>
                            <p>Developed a dedicated backend infrastructure to efficiently manage student data. Focused heavily on strict file operations, handling asynchronous reads, and executing complex SQL insertion commands using WampServer. The core objective was maintaining absolute data integrity and reliable query execution.</p>
                            <div style={{ display: 'flex', gap: '10px', marginTop: '1rem' }}>
                                <span className="pill" style={{ border: 'none', background: '#f0e9e4' }}>Node.js</span>
                                <span className="pill" style={{ border: 'none', background: '#f0e9e4' }}>MySQL</span>
                                <span className="pill" style={{ border: 'none', background: '#f0e9e4' }}>API Routing</span>
                            </div>
                        </div>
                    </div>
                </section>

                {/* FOOTER */}
                <footer className="footer reveal">
                    <h2>Let's Build Something.</h2>
                    <p style={{ color: '#a89f9a', maxWidth: '500px', margin: '0 auto' }}>Always open to discussing system architecture, algorithmic logic, and software engineering opportunities.</p>
                    
                    <div className="footer-links">
                        <a href="https://github.com/Kushvendra-Rathore" target="_blank" rel="noopener noreferrer" className="btn">GitHub Profile</a>
                        <a href="mailto:01fe24bcs104@kletech.ac.in" className="btn">Send an Email</a>
                    </div>
                    
                    <div className="copyright">
                        01FE24BCS104 • Kushvendra Singh Rathore • Personal Portfolio
                    </div>
                </footer>
            </div>
        );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<PortfolioHome />);
</script>

</body>
</html>
