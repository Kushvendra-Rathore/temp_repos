<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>React Portfolio Embed</title>
<!-- React & ReactDOM -->
<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
<!-- Babel for in-browser JSX compilation -->
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
    :root {
        --bg-main: #faf8f5;
        --primary-brown: #a07d63;
        --secondary-brown: #d9cec6;
        --text-dark: #3a2e28;
        --text-light: #ffffff;
        --nav-bg: #221c19;
    }

    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
        background-color: var(--bg-main);
        color: var(--text-dark);
        line-height: 1.7;
        overflow-x: hidden;
    }

    /* PAGE TRANSITION ANIMATION */
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }
    
    .page-view {
        animation: fadeIn 0.4s ease-out forwards;
    }

    /* NAVIGATION BAR */
    .custom-nav {
        display: flex;
        align-items: center;
        background-color: #fff;
        border-bottom: 1px solid var(--secondary-brown);
        padding: 0 2rem;
        position: sticky;
        top: 0;
        z-index: 1000;
        box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }

    .nav-item {
        padding: 1rem 1.5rem;
        cursor: pointer;
        font-size: 1rem;
        color: var(--text-dark);
        transition: all 0.2s ease;
        position: relative;
        user-select: none;
    }

    .nav-item:hover {
        background-color: #f5f0ec;
    }

    .nav-item.active {
        background-color: var(--nav-bg);
        color: #f7d59c; /* Slight yellow/gold tint as requested in image */
        font-weight: bold;
    }

    /* DROPDOWN MENU */
    .dropdown-container {
        position: relative;
    }

    .dropdown-menu {
        position: absolute;
        top: 100%;
        left: 0;
        background-color: #fff;
        min-width: 200px;
        box-shadow: 0 8px 24px rgba(0,0,0,0.15);
        border: 1px solid var(--secondary-brown);
        border-radius: 0 0 8px 8px;
        display: flex;
        flex-direction: column;
        z-index: 1001;
    }

    .dropdown-item {
        padding: 1rem 1.5rem;
        cursor: pointer;
        color: var(--text-dark);
        transition: background 0.2s;
        border-bottom: 1px solid #f0e9e4;
    }

    .dropdown-item:last-child {
        border-bottom: none;
    }

    .dropdown-item:hover {
        background-color: #f5f0ec;
        color: var(--primary-brown);
        padding-left: 1.8rem; /* slight indent on hover */
    }

    /* GENERAL LAYOUT STYLES (From previous version) */
    .hero {
        position: relative;
        padding: 6rem 10% 4rem;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
    }
    .hero-bg-shape {
        position: absolute;
        top: -10%; right: -5%; width: 300px; height: 400px;
        background-color: var(--secondary-brown);
        border-radius: 200px 0 0 200px; z-index: -1; opacity: 0.6;
    }
    .hero-tag {
        font-size: 0.85rem; font-weight: 600; text-transform: uppercase;
        letter-spacing: 3px; color: var(--primary-brown); margin-bottom: 1.5rem;
    }
    .hero h1 {
        font-size: 4rem; font-family: 'Georgia', serif; line-height: 1.1; margin-bottom: 1.5rem;
    }
    .hero p { font-size: 1.1rem; max-width: 600px; color: #665952; }
    
    .section { padding: 4rem 10%; }
    .section-title {
        font-size: 2.5rem; font-family: 'Georgia', serif; margin-bottom: 3rem;
        display: flex; align-items: center; gap: 15px;
    }
    .section-title::after {
        content: ""; height: 2px; flex-grow: 1; background-color: var(--secondary-brown);
    }
    
    .pill {
        background-color: var(--bg-main); color: var(--text-dark); padding: 8px 20px;
        border-radius: 30px; font-size: 0.9rem; border: 1px solid var(--secondary-brown);
        display: inline-block; margin: 5px;
    }
    
    .placeholder-view {
        padding: 8rem 10%;
        text-align: center;
        min-height: 60vh;
    }

    /* FOOTER */
    .footer {
        background-color: var(--text-dark); color: var(--bg-main);
        padding: 5rem 10% 2rem; text-align: center; margin-top: 2rem;
    }
    .footer-links { display: flex; justify-content: center; gap: 20px; margin: 2.5rem 0; }
    .btn {
        display: inline-block; border: 2px solid var(--primary-brown); color: var(--bg-main);
        padding: 12px 35px; border-radius: 30px; text-decoration: none; font-weight: 600;
        letter-spacing: 1px; transition: all 0.3s ease;
    }
    .btn:hover { background-color: var(--primary-brown); color: #fff; }
</style>
</head>
<body>

<!-- React Root Element -->
<div id="root"></div>

<!-- React Application Script -->
<script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- SUB-COMPONENTS FOR DIFFERENT VIEWS ---

    const HomeView = () => (
        <div className="page-view">
            <section className="hero">
                <div className="hero-bg-shape"></div>
                <div className="hero-tag">Computer Science & Engineering</div>
                <h1>Kushvendra<br/>Singh Rathore</h1>
                <p>I build efficient, secure, and highly scalable software systems. I prioritize clean logic, practical architecture, and writing code that actually solves real-world problems.</p>
            </section>

            <section className="section">
                <h2 className="section-title">Technical Expertise</h2>
                <div style={{ background: '#fff', padding: '3rem', borderRadius: '20px', boxShadow: '0 10px 30px rgba(0,0,0,0.03)' }}>
                    <div style={{ marginBottom: '2rem' }}>
                        <h3 style={{ fontFamily: 'Georgia', marginBottom: '1rem' }}>Languages & Logic</h3>
                        <span className="pill">C++</span>
                        <span className="pill">Java</span>
                        <span className="pill">Python</span>
                        <span className="pill">JavaScript</span>
                    </div>
                    <div>
                        <h3 style={{ fontFamily: 'Georgia', marginBottom: '1rem' }}>Systems & Stack</h3>
                        <span className="pill">Node.js</span>
                        <span className="pill">React.js</span>
                        <span className="pill">MySQL</span>
                        <span className="pill">MongoDB</span>
                        <span className="pill">System Architecture</span>
                    </div>
                </div>
            </section>
        </div>
    );

    const LearningsView = ({ topic }) => (
        <div className="page-view placeholder-view">
            <div className="hero-tag">Active Learning Module</div>
            <h1 style={{ fontSize: '3rem', fontFamily: 'Georgia', marginBottom: '1rem' }}>{topic}</h1>
            <p style={{ color: '#665952', maxWidth: '600px', margin: '0 auto' }}>
                This is a dynamically rendered view managed by React state. Currently displaying insights and project implementations focused on <strong>{topic}</strong>.
            </p>
        </div>
    );

    const AssignmentsView = () => (
        <div className="page-view placeholder-view">
            <div className="hero-tag">Academic & Technical</div>
            <h1 style={{ fontSize: '3rem', fontFamily: 'Georgia', marginBottom: '1rem' }}>Assignments</h1>
            <p style={{ color: '#665952', maxWidth: '600px', margin: '0 auto' }}>
                Repository of algorithmic problem-solving tasks, database management queries, and university software engineering deliverables.
            </p>
        </div>
    );


    // --- MAIN APP COMPONENT ---

    const PortfolioApp = () => {
        // State variables to control routing and dropdowns
        const [activePage, setActivePage] = useState('Home');
        const [learningTopic, setLearningTopic] = useState('');
        const [isDropdownOpen, setIsDropdownOpen] = useState(false);
        
        // Ref to handle clicking outside the dropdown to close it
        const dropdownRef = useRef(null);

        useEffect(() => {
            const handleClickOutside = (event) => {
                if (dropdownRef.current && !dropdownRef.current.contains(event.target)) {
                    setIsDropdownOpen(false);
                }
            };
            document.addEventListener("mousedown", handleClickOutside);
            return () => document.removeEventListener("mousedown", handleClickOutside);
        }, []);

        // Navigation Handlers
        const handleNavClick = (page) => {
            setActivePage(page);
            setIsDropdownOpen(false);
        };

        const handleLearningClick = (topic) => {
            setLearningTopic(topic);
            setActivePage('Learnings');
            setIsDropdownOpen(false);
        };

        return (
            <div>
                {/* INTERACTIVE NAVIGATION BAR */}
                <nav className="custom-nav">
                    <div 
                        className={`nav-item ${activePage === 'Home' ? 'active' : ''}`}
                        onClick={() => handleNavClick('Home')}
                    >
                        Home
                    </div>
                    
                    <div className="dropdown-container" ref={dropdownRef}>
                        <div 
                            className={`nav-item ${activePage === 'Learnings' ? 'active' : ''}`}
                            onClick={() => setIsDropdownOpen(!isDropdownOpen)}
                        >
                            Learnings <span>{isDropdownOpen ? '▲' : '▼'}</span>
                        </div>
                        
                        {isDropdownOpen && (
                            <div className="dropdown-menu">
                                <div className="dropdown-item" onClick={() => handleLearningClick('HTML')}>HTML</div>
                                <div className="dropdown-item" onClick={() => handleLearningClick('CSS')}>CSS</div>
                                <div className="dropdown-item" onClick={() => handleLearningClick('JavaScript')}>Java script</div>
                                <div className="dropdown-item" onClick={() => handleLearningClick('Node JS')}>node js</div>
                                <div className="dropdown-item" onClick={() => handleLearningClick('React JS')}>React js</div>
                            </div>
                        )}
                    </div>

                    <div 
                        className={`nav-item ${activePage === 'Assignments' ? 'active' : ''}`}
                        onClick={() => handleNavClick('Assignments')}
                    >
                        Assignments
                    </div>
                </nav>

                {/* DYNAMIC CONTENT RENDERER */}
                <main>
                    {activePage === 'Home' && <HomeView />}
                    {activePage === 'Learnings' && <LearningsView topic={learningTopic} />}
                    {activePage === 'Assignments' && <AssignmentsView />}
                </main>

                {/* STATIC FOOTER */}
                <footer className="footer">
                    <h2>Let's Build Something.</h2>
                    <div className="footer-links">
                        <a href="https://github.com/Kushvendra-Rathore" target="_blank" className="btn">GitHub Profile</a>
                        <a href="mailto:01fe24bcs104@kletech.ac.in" className="btn">Send an Email</a>
                    </div>
                    <div style={{ marginTop: '3rem', borderTop: '1px solid rgba(255,255,255,0.1)', paddingTop: '1.5rem', fontSize: '0.85rem', color: '#999' }}>
                        01FE24BCS104 • Kushvendra Singh Rathore
                    </div>
                </footer>
            </div>
        );
    };

    // Render the React application into the root div
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<PortfolioApp />);
</script>

</body>
</html>
